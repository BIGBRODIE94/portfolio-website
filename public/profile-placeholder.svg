<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003300;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00ff00" stroke-width="0.5" opacity="0.2"/>
  </pattern>
  <rect width="500" height="500" fill="url(#grid)"/>
  
  <!-- User icon -->
  <g transform="translate(250, 250)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="60" fill="none" stroke="url(#iconGradient)" stroke-width="8"/>
    
    <!-- Body -->
    <path d="M -80 80 Q -80 20, 0 20 Q 80 20, 80 80" fill="none" stroke="url(#iconGradient)" stroke-width="8"/>
  </g>
  
  <!-- Text -->
  <text x="250" y="450" font-family="Consolas, monospace" font-size="24" fill="#00ff00" text-anchor="middle">
    Replace with your photo
  </text>
  <text x="250" y="480" font-family="Consolas, monospace" font-size="16" fill="#00ffff" text-anchor="middle">
    /public/profile.jpg
  </text>
</svg>

